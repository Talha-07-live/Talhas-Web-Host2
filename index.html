<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Universal Stream Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
width:100%;
height:100%;
background:#050505;
overflow:hidden;
font-family:Arial,sans-serif;
}

.player{
position:fixed;
inset:0;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.15);
border-radius:14px;
color:#fff;
}

.topbar{
position:absolute;
top:15px;
left:15px;
right:15px;
padding:10px 14px;
display:flex;
justify-content:space-between;
z-index:20;
}

.controls{
position:absolute;
bottom:20px;
right:20px;
z-index:20;
}

.btn{
padding:12px 18px;
border:none;
cursor:pointer;
color:#fff;
font-size:14px;
}

.loading{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.45);
z-index:30;
}

.spinner{
width:60px;
height:60px;
border:5px solid rgba(255,255,255,.15);
border-top-color:#fff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.retry{
display:none;
position:absolute;
inset:0;
justify-content:center;
align-items:center;
z-index:40;
}

.retry button{
padding:15px 25px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="player">

<div class="glass topbar">
<div id="status">Loading...</div>
<div id="network">Checking...</div>
</div>

<video id="video" controls autoplay playsinline></video>

<div class="loading" id="loading">
<div class="spinner"></div>
</div>

<div class="retry" id="retryBox">
<button onclick="location.reload()">Reload Player</button>
</div>

<div class="controls">
<button class="glass btn" onclick="toggleFullscreen()">
Fullscreen
</button>
</div>

</div>

<script>
const STREAM_URL = "https://andro.226503.xyz/checklist/androstreamlivebs3.m3u8";

const video = document.getElementById("video");
const loading = document.getElementById("loading");
const retryBox = document.getElementById("retryBox");
const statusEl = document.getElementById("status");
const networkEl = document.getElementById("network");

function initPlayer(){

if(STREAM_URL.endsWith(".m3u8")){

if(Hls.isSupported()){

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:90
});

hls.loadSource(STREAM_URL);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play().catch(()=>{});
});

}else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src = STREAM_URL;

}

}

else if(STREAM_URL.endsWith(".mpd")){

const dashPlayer = dashjs.MediaPlayer().create();

dashPlayer.initialize(
video,
STREAM_URL,
true
);

dashPlayer.updateSettings({
streaming:{
lowLatencyEnabled:true
}
});

}

else{

video.src = STREAM_URL;

}

}

initPlayer();

function hideLoader(){
loading.style.display="none";
}

function showLoader(){
loading.style.display="flex";
}

video.addEventListener("loadeddata",()=>{
hideLoader();
statusEl.innerText="Ready";
});

video.addEventListener("playing",()=>{
hideLoader();
statusEl.innerText="Playing";
});

video.addEventListener("pause",()=>{
statusEl.innerText="Paused";
});

video.addEventListener("waiting",()=>{
showLoader();
statusEl.innerText="Buffering...";
});

video.addEventListener("stalled",()=>{
showLoader();
statusEl.innerText="Network Slow";
});

video.addEventListener("error",()=>{
loading.style.display="none";
retryBox.style.display="flex";
statusEl.innerText="Playback Error";
});

function toggleFullscreen(){

const el=document.documentElement;

if(!document.fullscreenElement){
el.requestFullscreen();
}else{
document.exitFullscreen();
}

}

function updateNetwork(){

networkEl.innerText =
navigator.onLine ? "Online" : "Offline";

}

window.addEventListener("online",updateNetwork);
window.addEventListener("offline",updateNetwork);

updateNetwork();
</script>

</body>
</html>
