<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talha IPTV Player - Green Theme</title>

<!-- Shaka Player UI -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/3.0.10/controls.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/3.0.10/shaka-player.ui.min.js"></script>
<script defer src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js"></script>

<!-- Custom Theme -->
<link rel="stylesheet" href="green-theme.css" />
<script src="green-script.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: #00ffcc;
}

#layout {
    display: flex;
    height: 100vh;
}

#channels {
    width: 30%;
    overflow-y: auto;
    background: #111827;
    padding: 10px;
    box-shadow: inset -2px 0 10px rgba(0,255,204,0.2);
}

.channel {
    padding: 12px;
    margin: 5px 0;
    background: #0f3460;
    color: #00ffcc;
    cursor: pointer;
    border-radius: 6px;
    border: 1px solid #00ffcc;
    transition: 0.3s;
}

.channel:hover {
    background: #00ffcc;
    color: #111827;
    transform: scale(1.05);
}

#player {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16213e;
}

video {
    width: 95%;
    height: 95%;
    border: 3px solid #00ffcc;
    border-radius: 12px;
    box-shadow: 0 0 25px #00ffcc;
}
</style>
</head>

<body>

<div id="layout">
    <div id="channels"></div>

    <div id="player">
        <video id="video" controls autoplay></video>
    </div>
</div>

<script>
// ===== CONFIG =====
const baseurl = "https://andro.evrenesoglu57.click/checklist/";

// ===== LOAD external script4.js =====
const script = document.createElement("script");
script.src = "https://mahsunsports39.xyz/script4.js";
document.head.appendChild(script);

// ===== WAIT UNTIL channels load =====
script.onload = () => {
    initApp();
};

function getM3U8(url) {
    const id = new URL("https://x.com" + url).searchParams.get("id");

    if (id === "androstreamlivebs1" || id === "facebooklivebs1") {
        return baseurl + "receptestt.m3u8";
    }

    return baseurl + id + ".m3u8";
}

function initApp() {
    const container = document.getElementById("channels");

    channels.forEach(ch => {
        const div = document.createElement("div");
        div.className = "channel";
        div.innerText = ch.title;

        div.onclick = () => playStream(getM3U8(ch.url));

        container.appendChild(div);
    });
}

// ===== PLAYER =====
let player;

function playStream(url) {
    const video = document.getElementById("video");

    if (player) {
        player.destroy();
    }

    player = new shaka.Player(video);

    player.load(url).catch(err => {
        console.error("Error loading stream", err);
    });
}
</script>

</body>
</html>
