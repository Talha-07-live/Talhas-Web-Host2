<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Talha Premium Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.15.5/shaka-player.compiled.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
background:#050505;
overflow:hidden;
}

.player-shell{
position:relative;
width:100%;
height:100%;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

/* CENTER PLAY BUTTON */
.center-play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85px;
height:85px;
border-radius:50%;
background:rgba(0,120,255,0.85);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:80;
transition:0.3s ease;
box-shadow:0 10px 30px rgba(0,120,255,0.4);
}

.center-play.hide{
opacity:0;
pointer-events:none;
transform:translate(-50%,-50%) scale(0.6);
}

.center-play svg{
width:38px;
height:38px;
fill:white;
}

/* CONTROLS */
.controls{
position:absolute;
left:0;
right:0;
bottom:0;
padding:18px;
background:linear-gradient(transparent,rgba(0,0,0,.95));
z-index:50;
opacity:1;
transition:opacity .3s ease;
}

.controls.hide{
opacity:0;
pointer-events:none;
}

.progress-track{
width:100%;
height:5px;
background:rgba(255,255,255,.15);
border-radius:999px;
overflow:hidden;
cursor:pointer;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#7a3cff,#d14cff);
}

.controls-row{
margin-top:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.controls-left,.controls-right{
display:flex;
align-items:center;
gap:10px;
}

.control-btn{
width:35px;
height:35px;
border:none;
cursor:pointer;
border-radius:50%;
background:linear-gradient(180deg,rgba(50,50,50,.95),rgba(10,10,10,.95));
box-shadow:inset 0 1px 1px rgba(255,255,255,.08),0 3px 10px rgba(0,0,0,.4);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.control-btn svg{
width:15px;
height:15px;
fill:white;
}

.delay-pill{
padding:8px 14px;
border-radius:999px;
background:#151515;
color:#b86cff;
font-weight:700;
}

.go-live{
padding:5px 6px;
border:none;
cursor:pointer;
border-radius:999px;
background:linear-gradient(90deg,#7a3cff,#c14dff);
color:white;
font-weight:700;
}

/* LOADER */
.loader{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.5);
z-index:100;
}

.spinner{
width:55px;
height:55px;
border-radius:50%;
border:4px solid rgba(255,255,255,.15);
border-top:4px solid #9c4dff;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="player-shell">

<video id="video" autoplay playsinline></video>

<!-- CENTER PLAY -->
<div class="center-play" id="centerPlay">
<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7z"/>
</svg>
</div>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<div class="controls">

<div class="progress-track">
<div class="progress-fill" id="progress"></div>
</div>

<div class="controls-row">

<div class="controls-left">

<button class="control-btn" id="playBtn">
<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7z"/>
</svg>
</button>

<button class="control-btn" id="rewBtn">⟲</button>
<button class="control-btn" id="fwdBtn">⟳</button>

<div class="delay-pill" id="delay">-00:00</div>

<button class="go-live" id="goLive">GO LIVE</button>

</div>

<div class="controls-right">

<button class="control-btn" id="fullscreenBtn">⛶</button>

</div>

</div>
</div>

</div>

<script>
const STREAM_URL =
"https://andro.evrenesoglu57.click/checklist/androstreamlivebsm2.m3u8";

let player, video, controls, playerShell, centerPlay, hideTimer;

function showControls(){
controls.classList.remove("hide");

clearTimeout(hideTimer);

if(!video || video.paused) return;

hideTimer = setTimeout(()=>{
controls.classList.add("hide");
},3000);
}

function toggleCenterPlay(){
if(video.paused || video.readyState < 3){
centerPlay.classList.remove("hide");
}else{
centerPlay.classList.add("hide");
}
}

async function init(){

video = document.getElementById("video");
controls = document.querySelector(".controls");
playerShell = document.querySelector(".player-shell");
centerPlay = document.getElementById("centerPlay");

player = new shaka.Player(video);

player.configure({
streaming:{
bufferingGoal:120,
rebufferingGoal:5,
bufferBehind:120
}
});

try{
await player.load(STREAM_URL);
document.getElementById("loader").style.display="none";
}catch(e){
console.error(e);
}

playerShell.addEventListener("mousemove",showControls);
playerShell.addEventListener("touchstart",showControls);

video.addEventListener("play",()=>{
showControls();
toggleCenterPlay();
});

video.addEventListener("pause",toggleCenterPlay);
video.addEventListener("waiting",toggleCenterPlay);
video.addEventListener("playing",toggleCenterPlay);

centerPlay.onclick = ()=>{
video.play();
};

}

/* BUTTONS */
document.getElementById("playBtn").onclick=()=>{
if(video.paused){
video.play();
}else{
video.pause();
controls.classList.remove("hide");
}
};

document.getElementById("rewBtn").onclick=()=>video.currentTime-=10;
document.getElementById("fwdBtn").onclick=()=>video.currentTime+=10;

document.getElementById("goLive").onclick=()=>{
if(!player.isLive()) return;
const range = player.seekRange();
video.currentTime = range.end;
};

document.getElementById("fullscreenBtn").onclick=()=>{
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
screen.orientation.lock("landscape").catch(()=>{});
}else{
document.exitFullscreen();
}
};

setInterval(()=>{
if(!player || !player.isLive()) return;

const range = player.seekRange();
const delay = Math.max(0,Math.floor(range.end-video.currentTime));

document.getElementById("delay").innerText =
"-"+String(Math.floor(delay/60)).padStart(2,"0")+":"+String(delay%60).padStart(2,"0");

const percent =
((video.currentTime-range.start)/(range.end-range.start))*100;

document.getElementById("progress").style.width = percent+"%";

},1000);

shaka.polyfill.installAll();

if(shaka.Player.isBrowserSupported()){
init();
}
</script>

</body>
</html>
